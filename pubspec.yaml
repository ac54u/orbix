name: orbix
description: "A premium qBittorrent client for iOS."
publish_to: 'none'
version: 1.0.4+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1 # 用于拦截并保存 qBit 返回的 Cookie
  cookie_jar: ^4.0.8         # Cookie 存储器
  get: ^4.6.6                # 状态管理
  shared_preferences: ^2.2.2 # 用于本地保存服务器 IP 和账号密码
  file_picker: ^8.1.2        # 选择本地 .torrent 文件上传
  flutter_slidable: ^3.1.1   # 服务器列表左滑操作（连接/编辑/删除）
  package_info_plus: ^8.0.0  # 读取当前 app 版本号，用于更新检测
  url_launcher: ^6.3.0       # 打开 release 页 / ipa 直链（兜底）
  share_plus: ^10.1.1        # 下载完 ipa 后唤起 iOS 原生分享面板 → 拷贝到 TrollStore
  path_provider: ^2.1.4      # 临时目录，存放下载的 ipa
  local_auth: ^2.3.0         # iOS 原生 Face ID / 生物识别，用于应用锁

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
