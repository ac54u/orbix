name: orbix
description: "A premium qBittorrent client for iOS."
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1 # 用于拦截并保存 qBit 返回的 Cookie
  cookie_jar: ^4.0.8         # Cookie 存储器
  get: ^4.6.6                # 状态管理
  shared_preferences: ^2.2.2 # 用于本地保存服务器 IP 和账号密码
  file_picker: ^8.1.2        # 选择本地 .torrent 文件上传
  flutter_slidable: ^3.1.1   # 服务器列表左滑操作（连接/编辑/删除）
  package_info_plus: ^8.0.0  # 读取当前 app 版本号，用于更新检测
  url_launcher: ^6.3.0       # 唤起 TrollStore 安装 scheme / 打开 release 页

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
