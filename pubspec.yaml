name: orbix
description: "A premium qBittorrent client for iOS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  percent_indicator: ^4.2.3
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1 # 用于拦截并保存 qBit 返回的 Cookie
  cookie_jar: ^4.0.8         # Cookie 存储器
  get: ^4.6.6                # 状态管理
  shared_preferences: ^2.2.2 # 用于本地保存服务器 IP 和账号密码
  file_picker: ^8.1.2        # 选择本地 .torrent 文件上传

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
