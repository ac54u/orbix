name: Orbix
options:
  bundleIdPrefix: com.orbix
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: ios/Orbix/Info.plist
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    SWIFT_VERSION: "5.9"

targets:
  Orbix:
    type: application
    platform: iOS
    sources:
      - path: ios/Orbix
    info:
      path: ios/Orbix/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.orbix
      INFOPLIST_FILE: ios/Orbix/Info.plist
      PRODUCT_NAME: Orbix
