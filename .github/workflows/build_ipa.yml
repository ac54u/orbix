name: Build IPA

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS release (without code signing)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/Release-iphoneos/Payload
          cp -r build/ios/Release-iphoneos/Runner.app build/ios/Release-iphoneos/Payload/
          cd build/ios/Release-iphoneos
          zip -r ../../../../Orbix.ipa Payload

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Orbix.ipa
          token: ${{ secrets.GITHUB_TOKEN }}
