name: Build Orbix IPA

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter (with cache)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter Pub Dependencies
        uses: actions/cache@v4
        with:
          path: /Users/runner/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Cache CocoaPods
        id: cache-pods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: cocoapods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: cocoapods-

      - name: Install Dependencies
        run: flutter pub get

      - name: Prepare iOS Project
        run: flutter build ios --simulator --config-only

      - name: Sync CocoaPods Sandbox
        if: steps.cache-pods.outputs.cache-hit != 'true'
        run: |
          cd ios
          pod install --no-repo-update
        continue-on-error: true

      - name: Force Disable All Code Signing
        run: |
          perl -i -pe 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/' ios/Runner.xcodeproj/project.pbxproj
          perl -i -pe 's/CODE_SIGN_IDENTITY = .*;/CODE_SIGN_IDENTITY = "";/' ios/Runner.xcodeproj/project.pbxproj
          perl -i -pe 's/CODE_SIGNING_ALLOWED = .*;/CODE_SIGNING_ALLOWED = NO;/' ios/Runner.xcodeproj/project.pbxproj
          perl -i -pe 's/CODE_SIGNING_REQUIRED = .*;/CODE_SIGNING_REQUIRED = NO;/' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Orbix.app
          cd build/ios/iphoneos
          zip -r Orbix.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbix-Unsigned-IPA
          path: build/ios/iphoneos/Orbix.ipa
          retention-days: 7

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/iphoneos/Orbix.ipa
          generate_release_notes: true
