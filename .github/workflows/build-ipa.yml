name: Build Orbix IPA

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # 生成 iOS 构建配置（使用 simulator 以绕过证书前置审查）
      - name: Prepare iOS Project
        run: flutter build ios --simulator --config-only

      # 直接修改 project.pbxproj 移除签名相关设置
      - name: Force Disable All Code Signing
        run: |
          # 移除 DEVELOPMENT_TEAM 设置
          sed -i '/DEVELOPMENT_TEAM = /d' ios/Runner.xcodeproj/project.pbxproj
          sed -i '/CODE_SIGN_IDENTITY = /d' ios/Runner.xcodeproj/project.pbxproj
          sed -i '/CODE_SIGNING_ALLOWED = /d' ios/Runner.xcodeproj/project.pbxproj
          sed -i '/CODE_SIGNING_REQUIRED = /d' ios/Runner.xcodeproj/project.pbxproj

          # 检查是否成功
          echo "✓ Code signing requirements removed from project.pbxproj"

      # 此时 Xcode 工程已变“瞎子”，放行无签编译
      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Orbix.app
          cd build/ios/iphoneos
          zip -r Orbix.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbix-Unsigned-IPA
          path: build/ios/iphoneos/Orbix.ipa
          retention-days: 7
