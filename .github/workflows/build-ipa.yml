name: Build Orbix IPA

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # 关键神级走位：声明为 simulator，完美绕过 Flutter 的证书前置审查，并生成所需的配置和 Pods
      - name: Prepare iOS Project & Pods
        run: |
          flutter build ios --simulator --config-only
          # 确保 Pods 被完整初始化
          cd ios
          pod install --repo-update || pod install
          cd ..

      # 使用 Ruby 脚本强行剥离主工程和插件包的所有签名要求
      - name: Force Disable All Code Signing
        run: |
          gem install xcodeproj --no-document
          cat << 'INNER_EOF' > disable_signing.rb
          require 'xcodeproj'

          def disable_signing(project_path)
            return unless File.exist?(project_path)
            puts "Processing: #{project_path}"
            project = Xcodeproj::Project.open(project_path)

            project.build_configurations.each do |config|
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              config.build_settings['CODE_SIGN_IDENTITY'] = ''
              config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
              config.build_settings['DEVELOPMENT_TEAM'] = ''
            end

            project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                config.build_settings['CODE_SIGN_STYLE'] = 'Automatic'
                config.build_settings['DEVELOPMENT_TEAM'] = ''
              end
            end
            project.save
          end

          disable_signing('ios/Runner.xcodeproj')
          disable_signing('ios/Pods/Pods.xcodeproj') if File.exist?('ios/Pods/Pods.xcodeproj')
          INNER_EOF
          ruby disable_signing.rb

      # 此时 Xcode 工程已变“瞎子”，放行无签编译
      - name: Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Orbix.app
          cd build/ios/iphoneos
          zip -r Orbix.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbix-Unsigned-IPA
          path: build/ios/iphoneos/Orbix.ipa
          retention-days: 7
